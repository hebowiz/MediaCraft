name: Windows Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag matching pyproject.toml (for example v0.6.0)"
        required: true
        type: string
      prerelease:
        description: "Mark the GitHub Release as a prerelease"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: windows-latest
    timeout-minutes: 40
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      FORCE_PRERELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Python 3.11.9
        uses: actions/setup-python@v6
        with:
          python-version: "3.11.9"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.txt
            requirements-lock.txt

      - name: Validate release tag
        shell: pwsh
        run: |
          $version = python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])"
          $versionPattern = [Regex]::Escape($version)
          if ($env:RELEASE_TAG -notmatch "^v$versionPattern(?:-[0-9A-Za-z][0-9A-Za-z.-]*)?$") {
              throw "Release tag '$env:RELEASE_TAG' does not match project version '$version'."
          }

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -q

      - name: Download pinned libmpv build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/setup_mpv.py

      - name: Build Windows distribution
        shell: pwsh
        run: .\scripts\build_windows.ps1

      - name: Create release archive and checksum
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifacts -Force | Out-Null
          $archive = "artifacts\MediaCraft-$env:RELEASE_TAG-win64.zip"
          Compress-Archive -Path "dist\MediaCraft" -DestinationPath $archive -CompressionLevel Optimal
          $hash = (Get-FileHash -LiteralPath $archive -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $([IO.Path]::GetFileName($archive))" | Set-Content -Encoding ascii "$archive.sha256"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: MediaCraft-${{ env.RELEASE_TAG }}-win64
          path: |
            artifacts/MediaCraft-${{ env.RELEASE_TAG }}-win64.zip
            artifacts/MediaCraft-${{ env.RELEASE_TAG }}-win64.zip.sha256
          if-no-files-found: error
          retention-days: 14

      - name: Create or update GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $archive = "artifacts\MediaCraft-$env:RELEASE_TAG-win64.zip"
          $checksum = "$archive.sha256"
          gh release view $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY 2>$null | Out-Null
          if ($LASTEXITCODE -eq 0) {
              gh release upload $env:RELEASE_TAG $archive $checksum --clobber --repo $env:GITHUB_REPOSITORY
              if ($LASTEXITCODE -ne 0) { throw "Failed to update GitHub Release assets." }
              exit 0
          }

          $releaseArguments = @(
              "release", "create", $env:RELEASE_TAG, $archive, $checksum,
              "--repo", $env:GITHUB_REPOSITORY,
              "--target", $env:GITHUB_SHA,
              "--title", "MediaCraft $env:RELEASE_TAG",
              "--generate-notes"
          )
          $isPrerelease = $env:RELEASE_TAG.Contains("-") -or $env:FORCE_PRERELEASE -eq "true"
          if ($isPrerelease) { $releaseArguments += "--prerelease" }
          & gh @releaseArguments
          if ($LASTEXITCODE -ne 0) { throw "Failed to create GitHub Release." }
